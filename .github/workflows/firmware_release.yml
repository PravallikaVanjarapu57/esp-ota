# ================================================================
#  GitHub Actions — ESP32 OTA Auto Build & Release
#
#  Triggers on every push to main branch.
#  Automatically:
#    1. Reads version from version.txt in repo root
#    2. Compiles firmware using PlatformIO
#    3. Creates a GitHub Release tagged with that version
#    4. Uploads firmware.bin + version.txt as release assets
#
#  Your ESP32 polls these assets every 60 s and self-updates.
# ================================================================

name: Build & Release ESP32 Firmware

on:
  push:
    branches:
      - main          # fires on every push to main
    paths-ignore:
      - '**.md'       # skip if only README changed
      - '.gitignore'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Read version from version.txt ─────────────────────
      - name: Read firmware version
        id: read_version
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Firmware version: $VERSION"

      # ── 3. Check this version isn't already released ──────────
      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.read_version.outputs.VERSION }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            echo "SKIP=true" >> $GITHUB_OUTPUT
          else
            echo "SKIP=false" >> $GITHUB_OUTPUT
          fi

      # ── 4. Set up Python (required by PlatformIO) ────────────
      - name: Set up Python
        if: steps.check_release.outputs.SKIP == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 5. Install PlatformIO ─────────────────────────────────
      - name: Install PlatformIO
        if: steps.check_release.outputs.SKIP == 'false'
        run: |
          pip install --upgrade pip
          pip install platformio

      # ── 6. Cache PlatformIO packages (speeds up builds) ───────
      - name: Cache PlatformIO
        if: steps.check_release.outputs.SKIP == 'false'
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      # ── 7. Compile firmware ───────────────────────────────────
      - name: Build firmware
        if: steps.check_release.outputs.SKIP == 'false'
        run: |
          pio run --environment esp32dev
          echo "Build complete!"
          ls -lh .pio/build/esp32dev/firmware.bin

      # ── 8. Create GitHub Release & upload assets ─────────────
      - name: Create GitHub Release
        if: steps.check_release.outputs.SKIP == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.read_version.outputs.VERSION }}"
          VERSION="${{ steps.read_version.outputs.VERSION }}"

          gh release create "$TAG" \
            --title "Firmware $VERSION" \
            --notes "Auto-built from commit ${{ github.sha }}

          ## What changed
          ${{ github.event.head_commit.message }}

          ## Files
          - \`firmware.bin\` — Flash to ESP32 via OTA or serial
          - \`version.txt\`  — Version string read by the device" \
            --latest \
            .pio/build/esp32dev/firmware.bin \
            version.txt
          
          echo "✅ Released firmware v$VERSION"